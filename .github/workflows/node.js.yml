name: Full CI/CD with Terraform, Ansible, K3s

on:
  push:
    branches:
      - main

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Select Terraform Workspace & Set Environment
        run: |
         BRANCH="${GITHUB_REF##*/}"
         case "$BRANCH" in 
         main)
         WORKSPACE="dev";; 
         staging)
         WORKSPACE="staging";;
         main1|prod)
         WORKSPACE="main";;
         *)
         echo "Unknown branch: $BRANCH"
         exit 1
         ;;
         esac

         echo "Using Terraform workspace: $WORKSPACE"
         terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE

         # Set environment variable for Terraform
         export TF_VAR_environment=$WORKSPACE



      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: ec2_ip
        working-directory: ./terraform
        run: |
          PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          echo "EC2_PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

  ansible-install-k3s:
    name: Install K3s via Ansible
    runs-on: self-hosted
    needs: terraform-apply
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible sshpass

      - name: Run Ansible Playbook
        run: |
          ansible-playbook ./ansible/playbook.yml \
          -i "${{ env.EC2_PUBLIC_IP }}," \
          --user ubuntu \
          --private-key ${{ secrets.EC2_SSH_KEY }}

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: ansible-install-k3s
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx26:v2 ./app

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx26:v2

  deploy-to-k3s:
    name: Deploy to K3s Cluster
    runs-on: self-hosted
    needs: build-and-push-docker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Kubeconfig from EC2
        run: scp -o StrictHostKeyChecking=no -i ${{ secrets.EC2_SSH_KEY }} ubuntu@${{ env.EC2_PUBLIC_IP }}:/etc/rancher/k3s/k3s.yaml ./kubeconfig

      - name: Deploy App
        env:
          KUBECONFIG: ./kubeconfig
        run: |
          kubectl apply -f ./k3s-project/k3s/deploy.yml
          kubectl apply -f ./k3s-project/k3s/k3s/svc.yml
          kubectl apply -f ./k3s-project/k3s/k3s/ingress.yml