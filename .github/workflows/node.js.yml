##test
name: Full CI/CD with Terraform, Ansible, K3s

on:
  push:
    branches:
      - main

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Select Terraform Workspace & Set Environment
        run: |
         # Use branch name directly as workspace
         WORKSPACE="${GITHUB_REF##*/}"

         echo "Using Terraform workspace: $WORKSPACE"

         # Select existing workspace or create new one
         terraform workspace select "$WORKSPACE" || terraform workspace new "$WORKSPACE"
     
         # Set Terraform environment variable
         export TF_VAR_environment="$WORKSPACE"



      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: get_ip
        working-directory: terraform
        run: |
          IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

      - name: Debug
        run: echo "Created server IP ${{ steps.get_ip.outputs.ec2_ip }}"

  ansible-install-k3s:
    name: Install K3s via Ansible
    runs-on: self-hosted
    needs: terraform-apply
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > test.pem
          sudo chmod 600 test.pem
      
      - name: Create Inventory File
        run: |
          echo "[k3s]" > inventory
          echo "${{ needs.terraform-apply.outputs.ec2_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=test.pem" >> inventory

      - name: Show Inventory
        run: cat inventory

      - name: Run Ansible Playbook
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory ./ansible/playbook.yml






                
